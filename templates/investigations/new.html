{% extends "base.html" %}
{% block title %}New Investigation — SOC Forge{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="{% url 'investigations:list' %}" class="text-sm text-gray-500 hover:text-indigo-400 transition-colors">
        ← Back to Investigations
    </a>
</div>

<div class="max-w-2xl">
    <h1 class="text-2xl font-bold text-white mb-6">New Investigation</h1>

    <form method="post" class="space-y-6">
        {% csrf_token %}

        <!-- IOC Input -->
        <div>
            <label for="ioc_value" class="block text-sm text-gray-400 mb-1">Indicator of Compromise</label>
            <input type="text" name="ioc_value" id="ioc_value"
                   value="{{ ioc_value|default:'' }}"
                   required autofocus
                   placeholder="Paste a hash, IP, domain, or URL..."
                   class="w-full px-4 py-3 bg-[#0f0f1a] border border-[#2d2d44] rounded-md text-gray-200 text-sm font-mono
                          focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500
                          placeholder-gray-600">
            <p class="text-xs text-gray-500 mt-1" id="ioc-hint">IOC type will be auto-detected.</p>
        </div>

        <!-- Profile Selection -->
        <div>
            <label class="block text-sm text-gray-400 mb-2">Investigation Profile</label>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                {% for profile in profiles %}
                <label class="block bg-[#1a1a2e] border border-[#2d2d44] rounded-lg p-4 cursor-pointer
                              hover:border-[#3d3d54] transition-all has-[:checked]:border-indigo-500 has-[:checked]:bg-[#1e1e35]">
                    <div class="flex items-start gap-3">
                        <input type="radio" name="profile_id" value="{{ profile.pk }}"
                               class="mt-1 text-indigo-500 focus:ring-indigo-500 focus:ring-offset-0 bg-[#0f0f1a] border-[#2d2d44]">
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-medium text-white">{{ profile.name }}</span>
                                {% if profile.is_default %}
                                <span class="text-xs text-gray-600">(system)</span>
                                {% endif %}
                            </div>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="inline-flex px-1.5 py-0.5 rounded text-xs
                                    {% if 'hash' in profile.ioc_type %}bg-violet-900/30 text-violet-300
                                    {% elif profile.ioc_type == 'ip' %}bg-emerald-900/30 text-emerald-300
                                    {% elif profile.ioc_type == 'domain' %}bg-amber-900/30 text-amber-300
                                    {% else %}bg-sky-900/30 text-sky-300{% endif %}">
                                    {{ profile.get_ioc_type_display }}
                                </span>
                                <span class="text-xs text-gray-500">{{ profile.source_count }} sources</span>
                            </div>
                            {% if profile.description %}
                            <p class="text-xs text-gray-500 mt-1">{{ profile.description|truncatechars:80 }}</p>
                            {% endif %}
                        </div>
                    </div>
                </label>
                {% endfor %}
            </div>
        </div>

        <button type="submit"
                class="inline-flex items-center gap-2 px-5 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium rounded-md transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            Execute Investigation
        </button>
    </form>
</div>
{% endblock %}
